<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AEGIS Logo Slate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #0b0f19;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 40px;
    }
    .logo-icon {
      width: 250px;
      height: 250px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .logo-text-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .logo-text {
      font-size: 160px;
      font-weight: 900;
      letter-spacing: 12px;
      margin: 0;
      background: linear-gradient(135deg, #0abde3, #1dd1a1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(10, 189, 227, 0.3);
    }
    .logo-sub {
      font-size: 28px;
      color: #94a3b8;
      letter-spacing: 4px;
      font-weight: 500;
      margin-top: -10px;
      text-transform: uppercase;
    }
    .amd-badge {
      margin-top: 80px;
      color: #94a3b8;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: 2px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="logo-icon">
      <svg width="250" height="250" viewBox="0 0 24 24" fill="none" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0abde3"/>
            <stop offset="100%" stop-color="#1dd1a1"/>
          </linearGradient>
        </defs>
        <path d="M12 3L2 12l10 9 10-9L12 3z"/>
        <path d="M12 8v8M8 12h8"/>
      </svg>
    </div>
    <div class="logo-text-container">
      <h1 class="logo-text">AEGIS</h1>
      <span class="logo-sub">Autonomous Examination Guardian & Intelligence System</span>
    </div>
  </div>
  <div class="amd-badge">
    Built for the AMD Developer Hackathon 2026
  </div>
</body>
</html>
